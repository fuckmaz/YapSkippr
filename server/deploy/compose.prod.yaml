services:
  db:
    image: postgres:16
    container_name: yapskippr-feedback-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yapskippr
      POSTGRES_USER: yapskippr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the production .env file}
    volumes:
      - yapskippr_feedback_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapskippr -d yapskippr"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    image: yapskippr-feedback-server:latest
    container_name: yapskippr-feedback-server
    build:
      context: ..
    restart: unless-stopped
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      DATABASE_URL: postgres://yapskippr:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the production .env file}@db:5432/yapskippr
      ADMIN_TOKEN: ${ADMIN_TOKEN:?Set ADMIN_TOKEN in the production .env file}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in the production .env file}
      ALLOWED_EXTENSION_ORIGINS: ${ALLOWED_EXTENSION_ORIGINS:-chrome-extension://*,moz-extension://*}
    ports:
      - "127.0.0.1:${YAPSKIPPR_HOST_PORT:-8787}:8787"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 8787) + '/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  yapskippr_feedback_db:
